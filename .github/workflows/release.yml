name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check version consistency
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          TAG="$VERSION"
          PLUGIN_VER=$(jq -r '.version' .claude-plugin/plugin.json)
          SKILL_VER=$(sed -n 's/^  version: *"\(.*\)"/\1/p' SKILL.md | head -n1)
          if [ "$PLUGIN_VER" != "$TAG" ]; then
            echo "::error::.claude-plugin/plugin.json version ($PLUGIN_VER) != tag ($TAG)"; exit 1
          fi
          if [ "$SKILL_VER" != "$TAG" ]; then
            echo "::error::SKILL.md metadata.version ($SKILL_VER) != tag ($TAG)"; exit 1
          fi
          if ! grep -qE "^## ${TAG}( |\$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## ${TAG}' heading"; exit 1
          fi
          echo "Version $TAG consistent across plugin.json, SKILL.md, CHANGELOG.md"

      - name: Extract changelog notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          TAG="$VERSION"
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "( |$)" { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Extracted $(wc -l < RELEASE_NOTES.md) line(s) of notes"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md --title "$TAG"
          else
            gh release create "$TAG" --notes-file RELEASE_NOTES.md --title "$TAG"
          fi
